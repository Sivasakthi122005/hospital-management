<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patient Details</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { align-items: flex-start; }
    .page-wrapper { align-items: flex-start; padding: 40px 16px; }
    .container { width: min(960px, 97vw); }
  </style>
</head>
<body class="admin-page">

  <div class="page-transition" id="pt"></div>

  <div class="page-wrapper">
    <div class="container">
      <h2>📋 All Patient Details</h2>

      <table id="patientTable">
        <thead>
          <tr>
            <th>Name</th>
            <th>Age</th>
            <th>Disease</th>
            <th>Doctor</th>
            <th>Date</th>
            <th>Time</th>
            <th>Token</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>

      <a href="admin.html" onclick="navTo(event,'admin.html')" class="btn">⬅ Back to Dashboard</a>
    </div>
  </div>

  <script>
    window.addEventListener('load', () => {
      document.getElementById('pt').classList.add('enter');

      const patients = JSON.parse(localStorage.getItem("patients")) || [];
      const tbody = document.getElementById("tableBody");

      if (patients.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7" style="color:rgba(255,255,255,0.35);padding:24px;">No patient records found.</td></tr>`;
      } else {
        patients.forEach(p => {
          tbody.innerHTML += `
            <tr>
              <td>${p.name    || "-"}</td>
              <td>${p.age     || "-"}</td>
              <td>${p.disease || "-"}</td>
              <td>${p.doctor  || "-"}</td>
              <td>${p.date    || "-"}</td>
              <td>${p.time    || "-"}</td>
              <td>${p.token   || "-"}</td>
            </tr>`;
        });
      }
    });

    function navTo(e, url) {
      e.preventDefault();
      const pt = document.getElementById('pt');
      pt.classList.remove('enter');
      pt.classList.add('leave');
      setTimeout(() => location.href = url, 450);
    }
  </script>
</body>
</html>
